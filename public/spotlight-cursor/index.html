<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotlight Cursor Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="layer layer-color">
        <div class="content">
          <p class="eyebrow">RIGHT SIGNAL • EXPERIENCE</p>
          <h1>Color reveals only where you point.</h1>
          <p class="lede">
            Premium flashlight cursor with masked color reveal, glow, and subtle grain—built in vanilla
            HTML/CSS/JS.
          </p>
          <div class="actions">
            <a class="btn" href="#">Request Access</a>
            <a class="btn ghost" href="#">View Work</a>
          </div>
        </div>
      </div>

      <div class="layer layer-mono">
        <div class="grain"></div>
      </div>

      <div class="cursor"></div>
      <div class="trail"></div>
      <div class="trail"></div>
      <div class="trail"></div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
